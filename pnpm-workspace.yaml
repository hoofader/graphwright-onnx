# Build-script allowlist. graphwright is a git dep whose `prepare` (tsc)
# builds its dist. The GLiNER backend (@lmoe/gliner-onnx) is not a
# declared dependency — the default extractor dynamic-imports it, so the
# host installs it only to use the built-in backend (its heavy native
# deps never enter this package's install).
onlyBuiltDependencies:
  - esbuild
  - graphwright

allowBuilds:
  esbuild: true
  graphwright: true
